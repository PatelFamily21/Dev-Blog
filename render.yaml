services:
  - type: web
    name: devlog
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn blog_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a secure random value
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: devlog-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: devlog-db
    databaseName: devlog
    user: devlog
    plan: free